name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: Time-Up

      - name: Run ESLint
        run: npm run lint
        working-directory: Time-Up

      - name: TypeScript Check
        run: npx tsc --noEmit
        working-directory: Time-Up

      - name: Verify Expo Config
        run: npx expo config --type public
        working-directory: Time-Up
